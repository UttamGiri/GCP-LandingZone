# Folder hierarchy — equivalent to AWS LZA OU structure
folders:
  - name: "Management"
    id: "management"
    parent: "organization"
    description: "Org administration, billing, identity"
    iam: {}

  - name: "Security"
    id: "security"
    parent: "organization"
    description: "Security tooling, SCC, KMS, secops"
    iam: {}

  - name: "Infrastructure"
    id: "infrastructure"
    parent: "organization"
    description: "Shared platform infrastructure"
    iam: {}

  - name: "Networking"
    id: "networking"
    parent: "infrastructure"
    description: "Network hub, egress, DNS"
    iam: {}

  - name: "Logging"
    id: "logging"
    parent: "infrastructure"
    description: "Central logging and monitoring"
    iam: {}

  - name: "Shared Services"
    id: "shared-services"
    parent: "infrastructure"
    description: "CI/CD, artifact registry, shared secrets"
    iam: {}

  - name: "Sandbox"
    id: "sandbox"
    parent: "organization"
    description: "Experimentation — relaxed policies"
    iam: {}

  - name: "Suspended"
    id: "suspended"
    parent: "organization"
    description: "Quarantined projects pending deletion"
    iam: {}

  - name: "Workloads"
    id: "workloads"
    parent: "organization"
    description: "Application workload projects"
    iam: {}

  - name: "Production"
    id: "production"
    parent: "workloads"
    description: "Production workloads"
    iam: {}

  - name: "Non-Production"
    id: "non-production"
    parent: "workloads"
    description: "Dev, staging, QA workloads"
    iam: {}
