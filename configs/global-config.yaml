# Global configuration — equivalent to AWS LZA global-config.yaml
organization:
  id: "000000000000"                    # Replace with your org ID
  domain: "example.com"
  customer_id: "C00000000"              # Cloud Identity customer ID

billing:
  account_id: "000000-000000-000000"    # Replace with billing account ID
  export:
    enabled: true
    dataset_id: "billing_export"
    table_id: "gcp_billing_export_v1"

defaults:
  region: "us-central1"
  zones:
    - "us-central1-a"
    - "us-central1-b"
    - "us-central1-c"
  allowed_locations:
    - "in:us-locations"
    - "in:us-central1-locations"
    - "in:us-east1-locations"

terraform:
  state_bucket: "tf-state-gcp-landing-zone"
  state_prefix: "landing-zone"

labels:
  mandatory:
    - environment
    - application
    - owner
    - cost-center
    - managed-by
  defaults:
    managed-by: "terraform"
    landing-zone: "gcp-lza"

logging:
  retention_days: 365
  audit_log_types:
    - ADMIN_READ
    - DATA_READ
    - DATA_WRITE

monitoring:
  notification_channels: []             # Add email/pubsub channel IDs after bootstrap
