# Network configuration — equivalent to AWS LZA network-config.yaml
shared_vpc:
  host_project: "proj-net-hub"
  network:
    name: "hub-vpc"
    routing_mode: "REGIONAL"
    auto_create_subnetworks: false

  subnets:
    - name: "subnet-app-us-central1"
      region: "us-central1"
      ip_cidr_range: "10.0.1.0/24"
      private_ip_google_access: true
      flow_logs:
        enabled: true
        aggregation_interval: "INTERVAL_5_SEC"
        flow_sampling: 0.5
      secondary_ranges:
        - range_name: "gke-pods"
          ip_cidr_range: "10.1.0.0/16"
        - range_name: "gke-services"
          ip_cidr_range: "10.2.0.0/20"

    - name: "subnet-data-us-central1"
      region: "us-central1"
      ip_cidr_range: "10.0.2.0/24"
      private_ip_google_access: true
      flow_logs:
        enabled: true

    - name: "subnet-gke-us-central1"
      region: "us-central1"
      ip_cidr_range: "10.0.3.0/24"
      private_ip_google_access: true
      flow_logs:
        enabled: true
      secondary_ranges:
        - range_name: "gke-pods-dedicated"
          ip_cidr_range: "10.3.0.0/16"

    - name: "subnet-proxy-us-central1"
      region: "us-central1"
      ip_cidr_range: "10.0.4.0/24"
      purpose: "REGIONAL_MANAGED_PROXY"
      role: "ACTIVE"
      private_ip_google_access: false

  service_projects:
    - "proj-net-egress"
    - "proj-prod-app-a"
    - "proj-dev-app-a"

egress:
  project: "proj-net-egress"
  region: "us-central1"
  cloud_nat:
    name: "centralized-nat"
    router: "egress-router"
    nat_ip_allocate_option: "AUTO_ONLY"
    source_subnetwork_ip_ranges_to_nat: "ALL_SUBNETWORKS_ALL_IP_RANGES"

dns:
  project: "proj-dns-admin"
  private_zones:
    - name: "corp-internal"
      dns_name: "internal.example.com."
      description: "Internal private DNS zone"
      networks:
        - "hub-vpc"

firewall:
  hierarchical_policy:
    name: "org-firewall-policy"
    rules:
      - priority: 1000
        direction: "INGRESS"
        action: "allow"
        description: "Allow internal RFC1918"
        ranges:
          - "10.0.0.0/8"
        target_tags: []
      - priority: 2000
        direction: "INGRESS"
        action: "allow"
        description: "Allow IAP for SSH/RDP"
        ranges:
          - "35.235.240.0/20"
        ports:
          - "22"
          - "3389"
      - priority: 65534
        direction: "INGRESS"
        action: "deny"
        description: "Default deny ingress"
        ranges:
          - "0.0.0.0/0"

hybrid:
  vpn:
    enabled: false
    name: "onprem-vpn"
    peer_ip: "0.0.0.0"
    shared_secret: ""                   # Store in Secret Manager
  interconnect:
    enabled: false
