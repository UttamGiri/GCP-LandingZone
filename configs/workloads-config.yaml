# Workload projects — Project Factory (equivalent to AWS LZA account vending)
workloads:
  - project_id: "proj-dev-app-a"
    name: "Dev App A"
    folder: "non-production"
    labels:
      environment: "dev"
      application: "app-a"
      owner: "team-a@example.com"
      cost-center: "CC-4001"
    apis:
      - compute.googleapis.com
      - container.googleapis.com
      - run.googleapis.com
      - sqladmin.googleapis.com
      - secretmanager.googleapis.com
    shared_vpc:
      enabled: true
      host_project: "proj-net-hub"
      subnets:
        - "subnet-app-us-central1"
        - "subnet-gke-us-central1"
    iam_bindings:
      "roles/editor":
        - "group:gcp-developers@example.com"

  - project_id: "proj-stg-app-a"
    name: "Staging App A"
    folder: "non-production"
    labels:
      environment: "stg"
      application: "app-a"
      owner: "team-a@example.com"
      cost-center: "CC-4001"
    apis:
      - compute.googleapis.com
      - container.googleapis.com
      - run.googleapis.com
      - sqladmin.googleapis.com
    shared_vpc:
      enabled: true
      host_project: "proj-net-hub"
      subnets:
        - "subnet-app-us-central1"
    iam_bindings:
      "roles/editor":
        - "group:gcp-developers@example.com"

  - project_id: "proj-prod-app-a"
    name: "Prod App A"
    folder: "production"
    labels:
      environment: "prod"
      application: "app-a"
      owner: "team-a@example.com"
      cost-center: "CC-4001"
      compliance: "pci"
    apis:
      - compute.googleapis.com
      - container.googleapis.com
      - run.googleapis.com
      - sqladmin.googleapis.com
      - secretmanager.googleapis.com
    shared_vpc:
      enabled: true
      host_project: "proj-net-hub"
      subnets:
        - "subnet-app-us-central1"
        - "subnet-gke-us-central1"
    iam_bindings:
      "roles/viewer":
        - "group:gcp-developers@example.com"
      "roles/container.developer":
        - "group:gcp-developers@example.com"

  - project_id: "proj-sandbox-dev-01"
    name: "Sandbox Dev 01"
    folder: "sandbox"
    labels:
      environment: "sandbox"
      application: "experiment"
      owner: "gcp-developers@example.com"
      cost-center: "CC-5000"
    apis:
      - compute.googleapis.com
      - container.googleapis.com
    shared_vpc:
      enabled: false
    iam_bindings:
      "roles/owner":
        - "group:gcp-developers@example.com"
