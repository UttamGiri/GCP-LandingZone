# IAM configuration — equivalent to AWS LZA identity-center mapping
groups:
  - id: "gcp-org-admins"
    email: "gcp-org-admins@example.com"
    description: "Organization administrators"
    org_roles:
      - "roles/resourcemanager.organizationAdmin"
      - "roles/billing.admin"
      - "roles/orgpolicy.policyAdmin"

  - id: "gcp-network-admins"
    email: "gcp-network-admins@example.com"
    description: "Network administrators"
    org_roles:
      - "roles/compute.networkAdmin"
      - "roles/compute.xpnAdmin"
      - "roles/dns.admin"
    folder_roles:
      networking:
        - "roles/compute.networkAdmin"
        - "roles/compute.securityAdmin"

  - id: "gcp-security-admins"
    email: "gcp-security-admins@example.com"
    description: "Security administrators"
    org_roles:
      - "roles/securitycenter.admin"
      - "roles/cloudkms.admin"
      - "roles/orgpolicy.policyAdmin"
    folder_roles:
      security:
        - "roles/securitycenter.admin"

  - id: "gcp-billing-admins"
    email: "gcp-billing-admins@example.com"
    description: "Billing administrators"
    org_roles:
      - "roles/billing.admin"
      - "roles/billing.costsManager"

  - id: "gcp-readonly-auditors"
    email: "gcp-readonly-auditors@example.com"
    description: "Read-only auditors"
    org_roles:
      - "roles/viewer"
      - "roles/logging.privateLogViewer"
      - "roles/cloudasset.viewer"

  - id: "gcp-developers"
    email: "gcp-developers@example.com"
    description: "Application developers"
    folder_roles:
      non-production:
        - "roles/editor"
      production:
        - "roles/viewer"

custom_roles:
  - role_id: "platformProjectCreator"
    title: "Platform Project Creator"
    description: "Create projects within approved folders"
    permissions:
      - "resourcemanager.projects.create"
      - "resourcemanager.projects.get"
      - "resourcemanager.projects.list"
      - "serviceusage.services.enable"
    scope: "organization"

  - role_id: "networkViewer"
    title: "Network Viewer"
    description: "Read-only network access across Shared VPC"
    permissions:
      - "compute.networks.get"
      - "compute.networks.list"
      - "compute.subnetworks.get"
      - "compute.subnetworks.list"
      - "compute.routes.get"
      - "compute.routes.list"
      - "compute.firewalls.get"
      - "compute.firewalls.list"
    scope: "organization"

service_accounts:
  - account_id: "sa-terraform-bootstrap"
    display_name: "Terraform Bootstrap"
    project: "proj-bootstrap"
    roles:
      - "roles/owner"
    description: "Bootstrap Terraform service account"

  - account_id: "sa-terraform-cicd"
    display_name: "Terraform CI/CD"
    project: "proj-cicd-shared"
    roles:
      - "roles/resourcemanager.projectCreator"
      - "roles/compute.networkAdmin"
      - "roles/iam.serviceAccountAdmin"
    description: "CI/CD pipeline service account for landing zone deploys"

  - account_id: "sa-log-writer"
    display_name: "Log Sink Writer"
    project: "proj-log-archive"
    roles:
      - "roles/storage.objectCreator"
    description: "Org log sink destination writer"

workload_identity:
  pool_id: "github-pool"
  provider_id: "github-provider"
  project: "proj-cicd-shared"
  attribute_mapping:
    "google.subject": "assertion.sub"
    "attribute.actor": "assertion.actor"
    "attribute.repository": "assertion.repository"
  attribute_condition: "assertion.repository.startsWith('myorg/gcp-landing-zone')"
