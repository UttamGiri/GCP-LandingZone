steps:
  - id: "init"
    name: "Terraform Init"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        cd stages/${_STAGE}
        terraform init -input=false

  - id: "validate"
    name: "Terraform Validate"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        cd stages/${_STAGE}
        terraform validate

  - id: "plan"
    name: "Terraform Plan"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        cd stages/${_STAGE}
        terraform plan -input=false -out=tfplan -no-color | tee plan.txt

  - id: "policy-check"
    name: "Policy Validation"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if command -v gcloud &> /dev/null; then
          cd stages/${_STAGE}
          gcloud beta terraform vet tfplan || echo "Install gcloud beta for policy validation"
        fi

substitutions:
  _STAGE: "0-org-setup"

options:
  logging: CLOUD_LOGGING_ONLY
