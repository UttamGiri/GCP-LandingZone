name: Terraform Bootstrap Seed (One-Time)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-bootstrap-seed-workspace
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/bootstrap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (seed OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_SEED_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SEED_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -input=false -var-file=ci.tfvars.hcl

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -var-file=ci.tfvars.hcl

      - name: Show Final OIDC Outputs
        run: |
          terraform output terraform_service_account_email
          terraform output workload_identity_provider
