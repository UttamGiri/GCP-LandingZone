name: Terraform Bootstrap

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-bootstrap-workspace
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/bootstrap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -var-file=ci.tfvars.hcl

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -var-file=ci.tfvars.hcl

      - name: Show Bootstrap Outputs
        run: |
          terraform output terraform_service_account_email
          terraform output workload_identity_provider
