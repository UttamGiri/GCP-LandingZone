name: Terraform Object Storage

on:
  pull_request:
    paths:
      - "terraform/object-storage/**"
      - ".github/workflows/terraform-object-storage.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/object-storage/**"
      - ".github/workflows/terraform-object-storage.yml"

permissions:
  contents: read

concurrency:
  group: terraform-object-storage-workspace
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/object-storage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -var-file=ci.tfvars.hcl

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -input=false -auto-approve -var-file=ci.tfvars.hcl
