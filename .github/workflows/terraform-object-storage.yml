name: Terraform Object Storage

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual object-storage run"
        required: false
        default: "manual run"
      run_apply:
        description: "Run terraform apply"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-object-storage-workspace
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/object-storage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -var-file=ci.tfvars.hcl

      - name: Terraform Apply
        if: ${{ github.event.inputs.run_apply == 'true' }}
        run: terraform apply -input=false -auto-approve -var-file=ci.tfvars.hcl
